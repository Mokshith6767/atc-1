<!DOCTYPE html>
<html>
<head>
    <title>Validate Inputs - Chintu's Login Form</title>
    <style>
        /* CSS: This makes the form look nice */
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 30px;
            background-color: #f4f4f9;
            text-align: center;
        }

        form {
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        input {
            margin: 10px 0;
            padding: 8px;
            width: 200px;
            display: block;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            width: 218px;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>

    <script>
        // JavaScript: This handles the validation logic
        function validateForm() {
            // Get the value of the name field using the form name
            var x = document.forms["myForm"]["fname"].value;
            // Get the value of the age field using its ID
            var y = document.getElementById("id1").value;

            // Check if fields are empty
            if (x == "" || y == "") {
                alert("Name/age cannot be empty");
                return false; 
            } 
            
            // Check if age is 18 or older
            if (y < 18) {
                alert("You must be 18 or older to login");
                return false;
            } 
            
            // If everything is correct
            alert("Successfully logged in");
            return true;
        }
    </script>
</head>
<body>

    <h2>Login Form</h2>
    <p>Please enter your details to continue.</p>
    
    <form name="myForm" onsubmit="return validateForm()">
        <label for="fname">Name:</label>
        <input type="text" name="fname" placeholder="Enter your name">

        <label for="id1">Age:</label>
        <input id="id1" type="number" min="18" placeholder="Must be 18+">
        
        <input type="submit" value="Login">
    </form>

    <p id="message"></p>

</body>
</html>
